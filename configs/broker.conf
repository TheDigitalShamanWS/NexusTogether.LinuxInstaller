# Title: Broker
# Description: RabbitMQ credentials, virtual host and permissions configuration.
# Complexity: Advanced

# Message Broker Configuration
BROKER_USER="nexusforever"
BROKER_PASS="RANDOM_PASSWORD_3"
BROKER_HOST="localhost"
BROKER_PORT="5672"

# Environment-specific configuration
if [[ "$CONFIG_MODE" == "Release" ]]; then
    # Production: Restricted access, secure vhost
    BROKER_VHOST="nexusforever_prod"
    BROKER_PERMISSIONS_CONF="^nexusforever\..*"
    BROKER_PERMISSIONS_READ="^nexusforever\..*"
    BROKER_PERMISSIONS_WRITE="^nexusforever\.publish\..*"
else
    # Debug (default): Full access, development vhost
    BROKER_VHOST="nexusforever_dev"
    BROKER_PERMISSIONS_CONF=".*"
    BROKER_PERMISSIONS_READ=".*"
    BROKER_PERMISSIONS_WRITE=".*"
fi
