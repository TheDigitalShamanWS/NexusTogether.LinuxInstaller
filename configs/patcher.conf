# Title: Patcher
# Description: NexusForever patcher server configuration and game file settings.
# Complexity: Simple

# Game files directory
PATCHER_GAME_FILES="$BASE_DIR/nexusforever-client/"

# Patcher Server Configuration
PATCHER_HOST="0.0.0.0"
PATCHER_URL="http://localhost:8080"
PATCHER_BUILD="16042"

# Logging Configuration
PATCHER_LOG_LEVEL="Information"
PATCHER_LOG_FILE="patcher.log"

# Performance Settings
PATCHER_ENABLE_COMPRESSION="true"
PATCHER_MAX_CONNECTIONS="100"
PATCHER_CACHE_SIZE="1000"
PATCHER_TIMEOUT="30"

# Additional Files Configuration
# These files will be published alongside the patch server
# Format: "local_path|remote_name|publish_bin"
# Example: "/path/to/Wildstar.exe|Launcher.exe|true"
PATCHER_ADDITIONAL_FILES=(
    # "/path/to/file.exe|RemoteName.exe|true"
)

# Game File Settings
PATCHER_INDEX_DIRECTORIES=(
    # "Client"
    # "Client64" 
    # "Launcher"
    # "Custom"
)
