# Title: Services
# Description: Service user, management mode and systemd service definitions.
# Complexity: Advanced

# Dedicated user for running services (separate from root)
SERVICE_USER="nexusforever"

# Options: "screen" (interactive with auto-restart) or "direct" (simple background)
SERVICE_MODE="screen"

# Systemd Service Configuration
SERVICE_PREFIX="nexusforever"

# NexusForever Services Definition
NEXUS_SERVICES=(
    "sts:NexusForever.StsServer:STS Server"
    "auth:NexusForever.AuthServer:Auth Server"
    "world:NexusForever.WorldServer:World Server"
    "chat:NexusForever.Server.ChatServer:Chat Server"
    "group:NexusForever.Server.GroupServer:Group Server"
    "api:NexusForever.API.Character:Character API"
    "patcher:Nexus.Patch.Server:Patcher Server"
)
